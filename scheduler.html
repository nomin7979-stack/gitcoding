<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스케줄러</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #1a1a2e;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 256px;
      min-width: 256px;
      background: #fff;
      border-right: 1px solid #e8e8f0;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 20px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: #4f46e5;
      letter-spacing: -0.5px;
    }

    /* Mini Calendar */
    .mini-cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .mini-cal-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #333;
    }

    .mini-nav {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 0.75rem;
      padding: 3px 7px;
      border-radius: 6px;
      transition: background 0.12s, color 0.12s;
    }

    .mini-nav:hover { background: #f0f0f8; color: #4f46e5; }

    .mini-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }

    .mini-weekday {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #bbb;
      padding: 2px 0;
      letter-spacing: 0.3px;
    }

    .mini-weekday:first-child { color: #e55; }
    .mini-weekday:last-child { color: #55e; }

    .mini-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .mini-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.7rem;
      cursor: pointer;
      color: #444;
      transition: background 0.12s;
      position: relative;
    }

    .mini-day:hover:not(.empty) { background: #ede9fe; }
    .mini-day.empty { cursor: default; }
    .mini-day.today { background: #4f46e5; color: #fff; font-weight: 700; }
    .mini-day.today:hover { background: #4338ca; }
    .mini-day.in-week:not(.today) { background: #ede9fe; color: #4f46e5; font-weight: 600; }
    .mini-day.sunday:not(.today):not(.in-week) { color: #e55; }
    .mini-day.saturday:not(.today):not(.in-week) { color: #55e; }
    .mini-day.has-event::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .mini-day.today.has-event::after { background: rgba(255,255,255,0.8); }

    /* Section title */
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Upcoming events */
    .upcoming-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .upcoming-item {
      background: #f8f7ff;
      border-left: 3px solid #4f46e5;
      border-radius: 0 8px 8px 0;
      padding: 7px 10px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .upcoming-item:hover { background: #ede9fe; }
    .upcoming-item .up-title { font-size: 0.78rem; font-weight: 600; color: #333; }
    .upcoming-item .up-time { color: #999; font-size: 0.68rem; margin-top: 2px; }

    .no-upcoming {
      font-size: 0.78rem;
      color: #ccc;
      text-align: center;
      padding: 14px 0;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      background: #fff;
      border-bottom: 1px solid #e8e8f0;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .week-nav-btn {
      background: #f0f2f5;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: #555;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }

    .week-nav-btn:hover { background: #4f46e5; color: #fff; }

    .week-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a2e;
      flex: 1;
    }

    .today-jump-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      transition: background 0.12s;
    }

    .today-jump-btn:hover { background: #4338ca; }

    /* Day header row */
    .day-header-row {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      background: #fff;
      border-bottom: 2px solid #e8e8f0;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .time-gutter-top { border-right: 1px solid #e8e8f0; }

    .day-header {
      padding: 8px 4px 8px;
      text-align: center;
      border-right: 1px solid #f0f0f8;
      cursor: pointer;
      transition: background 0.12s;
    }

    .day-header:hover { background: #f8f7ff; }

    .day-header .dow-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .day-header .date-badge {
      font-size: 1.2rem;
      font-weight: 700;
      color: #333;
      line-height: 1.2;
      margin-top: 2px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 3px auto 0;
      border-radius: 50%;
    }

    .day-header.today-col .dow-label { color: #4f46e5; }
    .day-header.today-col .date-badge { background: #4f46e5; color: #fff; }
    .day-header.sunday-col:not(.today-col) .date-badge { color: #e55; }
    .day-header.saturday-col:not(.today-col) .date-badge { color: #55e; }

    /* Scrollable grid */
    .grid-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .week-grid {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
    }

    .time-label {
      height: 60px;
      border-right: 1px solid #e8e8f0;
      border-bottom: 1px solid #f5f5fa;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 4px 8px 0 0;
      font-size: 0.63rem;
      color: #ccc;
      flex-shrink: 0;
    }

    .time-cell {
      height: 60px;
      border-right: 1px solid #f0f0f8;
      border-bottom: 1px solid #f5f5fa;
      position: relative;
      cursor: pointer;
      transition: background 0.1s;
      overflow: visible;
    }

    .time-cell:hover { background: #f5f3ff; }
    .time-cell.today-col { background: #fafaff; }
    .time-cell.today-col:hover { background: #f0eeff; }
    .time-cell.hour-half::before {
      content: '';
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      border-top: 1px dashed #f0f0f8;
    }

    /* Current time indicator */
    .now-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ef4444;
      z-index: 4;
      pointer-events: none;
    }

    .now-dot {
      position: absolute;
      left: -4px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    /* Event blocks */
    .event-block {
      position: absolute;
      left: 3px;
      right: 3px;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 3;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
      transition: filter 0.12s, box-shadow 0.12s;
    }

    .event-block:hover {
      filter: brightness(0.92);
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }

    .event-block .ev-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-block .ev-time {
      font-weight: 400;
      opacity: 0.85;
      font-size: 0.62rem;
      margin-top: 1px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 40, 0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      width: 360px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: modal-in 0.18s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a2e;
    }

    .modal-date-label {
      font-size: 0.75rem;
      color: #aaa;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .modal-label {
      font-size: 0.72rem;
      color: #999;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .modal-input {
      border: 1.5px solid #e8e8f0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.88rem;
      outline: none;
      transition: border 0.15s;
      font-family: inherit;
      width: 100%;
      color: #1a1a2e;
    }

    .modal-input:focus { border-color: #4f46e5; }

    .modal-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .color-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.12s, transform 0.1s;
    }

    .color-dot.selected {
      border-color: #1a1a2e;
      transform: scale(1.18);
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .btn-delete {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-delete:hover { background: #fecaca; }

    .btn-cancel {
      background: #f0f2f5;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      color: #666;
      margin-left: auto;
      transition: background 0.12s;
    }

    .btn-cancel:hover { background: #e2e4eb; }

    .btn-save {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-save:hover { background: #4338ca; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title">스케줄러</div>

  <div>
    <div class="mini-cal-header">
      <button class="mini-nav" id="miniPrev">&#9664;</button>
      <div class="mini-cal-title" id="miniMonthYear"></div>
      <button class="mini-nav" id="miniNext">&#9654;</button>
    </div>
    <div class="mini-weekdays">
      <div class="mini-weekday">일</div><div class="mini-weekday">월</div>
      <div class="mini-weekday">화</div><div class="mini-weekday">수</div>
      <div class="mini-weekday">목</div><div class="mini-weekday">금</div>
      <div class="mini-weekday">토</div>
    </div>
    <div class="mini-days" id="miniDays"></div>
  </div>

  <div>
    <div class="section-title">다가오는 일정</div>
    <div class="upcoming-list" id="upcomingList"></div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="top-bar">
    <button class="week-nav-btn" id="prevWeekBtn">&#8592;</button>
    <button class="week-nav-btn" id="nextWeekBtn">&#8594;</button>
    <div class="week-label" id="weekLabel"></div>
    <button class="today-jump-btn" id="todayBtn">오늘</button>
  </div>

  <div class="day-header-row" id="dayHeaderRow">
    <div class="time-gutter-top"></div>
  </div>

  <div class="grid-scroll" id="gridScroll">
    <div class="week-grid" id="weekGrid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">일정 추가</div>
      <div class="modal-date-label" id="modalDateLabel"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">제목</div>
      <input class="modal-input" id="evTitle" placeholder="일정 제목..." maxlength="40" />
    </div>
    <div class="modal-row-2">
      <div class="modal-field">
        <div class="modal-label">시작 시간</div>
        <input class="modal-input" type="time" id="evStart" />
      </div>
      <div class="modal-field">
        <div class="modal-label">종료 시간</div>
        <input class="modal-input" type="time" id="evEnd" />
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">메모</div>
      <input class="modal-input" id="evMemo" placeholder="메모 (선택)" maxlength="80" />
    </div>
    <div class="modal-field">
      <div class="modal-label">색상</div>
      <div class="color-options" id="colorOptions"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="deleteEvBtn" style="display:none">삭제</button>
      <button class="btn-cancel" id="cancelEvBtn">취소</button>
      <button class="btn-save" id="saveEvBtn">저장</button>
    </div>
  </div>
</div>

<script>
  const EVENT_COLORS = [
    { bg: '#6366f1', text: '#fff', name: 'indigo' },
    { bg: '#10b981', text: '#fff', name: 'green' },
    { bg: '#f59e0b', text: '#fff', name: 'amber' },
    { bg: '#ef4444', text: '#fff', name: 'red' },
    { bg: '#3b82f6', text: '#fff', name: 'blue' },
    { bg: '#ec4899', text: '#fff', name: 'pink' },
    { bg: '#8b5cf6', text: '#fff', name: 'violet' },
    { bg: '#06b6d4', text: '#fff', name: 'cyan' },
  ];

  const DOW_KO = ['일', '월', '화', '수', '목', '금', '토'];
  const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const todayRaw = new Date();
  const today = new Date(todayRaw.getFullYear(), todayRaw.getMonth(), todayRaw.getDate());

  let weekStart = getWeekStart(new Date());
  let miniCal = { year: today.getFullYear(), month: today.getMonth() };
  let events = {};
  let modalState = null;
  let selectedColor = 0;
  let nowLineInterval = null;

  try { events = JSON.parse(localStorage.getItem('sched_events') || '{}'); } catch(e) {}

  function getWeekStart(d) {
    const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    dt.setDate(dt.getDate() - dt.getDay());
    return dt;
  }

  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function minutesToTime(m) { return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }

  function timeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function saveEvents() {
    try { localStorage.setItem('sched_events', JSON.stringify(events)); } catch(e) {}
  }

  // ── Build week days array ──
  function getWeekDays() {
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      return d;
    });
  }

  // ── Render ──
  function render() {
    renderDayHeaders();
    renderGrid();
    renderMiniCal();
    renderUpcoming();
    scheduleNowLine();
  }

  function renderDayHeaders() {
    const days = getWeekDays();
    const weekEnd = days[6];
    const ws = days[0];
    const sameMonth = ws.getMonth() === weekEnd.getMonth();
    document.getElementById('weekLabel').textContent = sameMonth
      ? `${ws.getFullYear()}년 ${ws.getMonth()+1}월 ${ws.getDate()}일 – ${weekEnd.getDate()}일`
      : `${ws.getFullYear()}년 ${ws.getMonth()+1}월 ${ws.getDate()}일 – ${weekEnd.getMonth()+1}월 ${weekEnd.getDate()}일`;

    const row = document.getElementById('dayHeaderRow');
    // remove old day headers (keep gutter)
    while (row.children.length > 1) row.removeChild(row.lastChild);

    days.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'day-header';
      const isToday = d.getTime() === today.getTime();
      if (isToday) col.classList.add('today-col');
      if (i === 0) col.classList.add('sunday-col');
      if (i === 6) col.classList.add('saturday-col');

      col.innerHTML = `<div class="dow-label">${DOW_KO[i]}</div><div class="date-badge">${d.getDate()}</div>`;
      col.addEventListener('click', () => {
        weekStart = getWeekStart(d);
        miniCal = { year: d.getFullYear(), month: d.getMonth() };
        render();
      });
      row.appendChild(col);
    });
  }

  function renderGrid() {
    const days = getWeekDays();
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';

    for (let h = 0; h < 24; h++) {
      // Time label
      const label = document.createElement('div');
      label.className = 'time-label';
      label.textContent = h === 0 ? '' : `${pad(h)}:00`;
      grid.appendChild(label);

      days.forEach((d, di) => {
        const cell = document.createElement('div');
        cell.className = 'time-cell hour-half';
        const isToday = d.getTime() === today.getTime();
        if (isToday) cell.classList.add('today-col');

        cell.addEventListener('click', (e) => {
          if (e.target !== cell) return;
          openAddModal(d, h);
        });

        // Render events starting in this hour
        const key = dateKey(d);
        const dayEvents = (events[key] || []);
        dayEvents.forEach((ev, idx) => {
          const startMin = timeToMinutes(ev.start);
          const endMin = timeToMinutes(ev.end);
          if (Math.floor(startMin / 60) !== h) return;

          const top = (startMin % 60) / 60 * 60;
          const dur = Math.max(endMin - startMin, 15);
          const height = dur / 60 * 60 - 2;
          const color = EVENT_COLORS[ev.color ?? 0];

          const block = document.createElement('div');
          block.className = 'event-block';
          block.style.cssText = `top:${top}px;height:${height}px;background:${color.bg};color:${color.text};`;
          block.innerHTML = `<div class="ev-title">${escHtml(ev.title)}</div>`
            + (dur > 20 ? `<div class="ev-time">${ev.start} – ${ev.end}</div>` : '');
          block.addEventListener('click', (e) => {
            e.stopPropagation();
            openEditModal(key, idx);
          });
          cell.appendChild(block);
        });

        // Now-line for today column
        if (isToday && h === todayRaw.getHours()) {
          const nowLine = document.createElement('div');
          nowLine.className = 'now-line';
          nowLine.id = `now-line-${h}`;
          updateNowLinePos(nowLine);
          nowLine.innerHTML = '<div class="now-dot"></div>';
          cell.appendChild(nowLine);
        }

        grid.appendChild(cell);
      });
    }

    // Scroll to appropriate hour
    const scroll = document.getElementById('gridScroll');
    const targetHour = Math.max(todayRaw.getHours() - 1, 6);
    scroll.scrollTop = targetHour * 60;
  }

  function updateNowLinePos(el) {
    const now = new Date();
    const pct = (now.getMinutes() + now.getSeconds() / 60) / 60;
    el.style.top = `${pct * 60}px`;
  }

  function scheduleNowLine() {
    if (nowLineInterval) clearInterval(nowLineInterval);
    const days = getWeekDays();
    const isTodayVisible = days.some(d => d.getTime() === today.getTime());
    if (!isTodayVisible) return;
    nowLineInterval = setInterval(() => {
      const h = new Date().getHours();
      const el = document.getElementById(`now-line-${h}`);
      if (el) updateNowLinePos(el);
    }, 30000);
  }

  // ── Mini Calendar ──
  function renderMiniCal() {
    const { year, month } = miniCal;
    document.getElementById('miniMonthYear').textContent = `${year}년 ${MONTH_KO[month]}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);

    const grid = document.getElementById('miniDays');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div');
      e.className = 'mini-day empty';
      grid.appendChild(e);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(year, month, d);
      const dow = (firstDay + d - 1) % 7;
      const isToday = dt.getTime() === today.getTime();
      const inWeek = dt >= weekStart && dt <= weekEnd;
      const key = dateKey(dt);
      const hasEv = events[key] && events[key].length > 0;

      const cell = document.createElement('div');
      cell.className = 'mini-day';
      if (dow === 0) cell.classList.add('sunday');
      if (dow === 6) cell.classList.add('saturday');
      if (isToday) cell.classList.add('today');
      if (inWeek) cell.classList.add('in-week');
      if (hasEv) cell.classList.add('has-event');
      cell.textContent = d;
      cell.addEventListener('click', () => {
        weekStart = getWeekStart(dt);
        render();
      });
      grid.appendChild(cell);
    }
  }

  // ── Upcoming Events ──
  function renderUpcoming() {
    const list = document.getElementById('upcomingList');
    list.innerHTML = '';

    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const upcoming = [];

    for (let i = 0; i < 14; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      const key = dateKey(d);
      (events[key] || []).forEach((ev, idx) => {
        const startMin = timeToMinutes(ev.start);
        if (i === 0 && startMin <= nowMin) return;
        upcoming.push({ d, key, idx, ev, startMin: i * 1440 + startMin });
      });
    }

    upcoming.sort((a, b) => a.startMin - b.startMin);

    if (upcoming.length === 0) {
      list.innerHTML = '<div class="no-upcoming">다가오는 일정이 없습니다</div>';
      return;
    }

    upcoming.slice(0, 6).forEach(({ d, key, idx, ev }) => {
      const color = EVENT_COLORS[ev.color ?? 0];
      const isToday = d.getTime() === today.getTime();
      const timeDiff = Math.floor((d - today) / 86400000);
      let dateStr;
      if (isToday) dateStr = '오늘';
      else if (timeDiff === 1) dateStr = '내일';
      else dateStr = `${d.getMonth()+1}/${d.getDate()} (${DOW_KO[d.getDay()]})`;

      const item = document.createElement('div');
      item.className = 'upcoming-item';
      item.style.borderLeftColor = color.bg;
      item.innerHTML = `<div class="up-title">${escHtml(ev.title)}</div><div class="up-time">${dateStr} · ${ev.start}–${ev.end}</div>`;
      item.addEventListener('click', () => {
        weekStart = getWeekStart(d);
        render();
        setTimeout(() => {
          const h = Math.floor(timeToMinutes(ev.start) / 60);
          document.getElementById('gridScroll').scrollTop = Math.max(h - 1, 0) * 60;
        }, 50);
      });
      list.appendChild(item);
    });
  }

  // ── Modal ──
  function initColorPicker() {
    const container = document.getElementById('colorOptions');
    EVENT_COLORS.forEach((c, i) => {
      const dot = document.createElement('div');
      dot.className = 'color-dot' + (i === 0 ? ' selected' : '');
      dot.style.background = c.bg;
      dot.addEventListener('click', () => setSelectedColor(i));
      container.appendChild(dot);
    });
  }

  function setSelectedColor(idx) {
    selectedColor = idx;
    document.querySelectorAll('.color-dot').forEach((d, i) => {
      d.classList.toggle('selected', i === idx);
    });
  }

  function openAddModal(date, hour) {
    modalState = { mode: 'add', date };
    document.getElementById('modalTitle').textContent = '일정 추가';
    document.getElementById('modalDateLabel').textContent = `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 (${DOW_KO[date.getDay()]})`;
    document.getElementById('evTitle').value = '';
    document.getElementById('evStart').value = `${pad(hour)}:00`;
    document.getElementById('evEnd').value = `${pad(Math.min(hour + 1, 23))}:00`;
    document.getElementById('evMemo').value = '';
    document.getElementById('deleteEvBtn').style.display = 'none';
    setSelectedColor(0);
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('evTitle').focus(), 60);
  }

  function openEditModal(key, idx) {
    const ev = events[key][idx];
    modalState = { mode: 'edit', key, idx };
    const parts = key.split('-');
    const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
    document.getElementById('modalTitle').textContent = '일정 수정';
    document.getElementById('modalDateLabel').textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DOW_KO[d.getDay()]})`;
    document.getElementById('evTitle').value = ev.title;
    document.getElementById('evStart').value = ev.start;
    document.getElementById('evEnd').value = ev.end;
    document.getElementById('evMemo').value = ev.memo || '';
    document.getElementById('deleteEvBtn').style.display = '';
    setSelectedColor(ev.color ?? 0);
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('evTitle').focus(), 60);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    modalState = null;
  }

  function saveEvent() {
    const title = document.getElementById('evTitle').value.trim();
    if (!title) { document.getElementById('evTitle').focus(); return; }
    const start = document.getElementById('evStart').value;
    const end = document.getElementById('evEnd').value;
    if (!start || !end) { alert('시작/종료 시간을 입력하세요.'); return; }
    if (timeToMinutes(end) <= timeToMinutes(start)) {
      alert('종료 시간이 시작 시간보다 늦어야 합니다.');
      return;
    }
    const ev = { title, start, end, memo: document.getElementById('evMemo').value.trim(), color: selectedColor };

    if (modalState.mode === 'add') {
      const key = dateKey(modalState.date);
      if (!events[key]) events[key] = [];
      events[key].push(ev);
    } else {
      events[modalState.key][modalState.idx] = ev;
    }

    saveEvents();
    closeModal();
    render();
  }

  function deleteEvent() {
    if (!confirm('이 일정을 삭제하시겠습니까?')) return;
    const { key, idx } = modalState;
    events[key].splice(idx, 1);
    if (!events[key].length) delete events[key];
    saveEvents();
    closeModal();
    render();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Event Listeners ──
  document.getElementById('prevWeekBtn').addEventListener('click', () => {
    weekStart = new Date(weekStart);
    weekStart.setDate(weekStart.getDate() - 7);
    render();
  });

  document.getElementById('nextWeekBtn').addEventListener('click', () => {
    weekStart = new Date(weekStart);
    weekStart.setDate(weekStart.getDate() + 7);
    render();
  });

  document.getElementById('todayBtn').addEventListener('click', () => {
    weekStart = getWeekStart(new Date());
    miniCal = { year: today.getFullYear(), month: today.getMonth() };
    render();
    setTimeout(() => {
      const h = Math.max(todayRaw.getHours() - 1, 0);
      document.getElementById('gridScroll').scrollTop = h * 60;
    }, 50);
  });

  document.getElementById('miniPrev').addEventListener('click', () => {
    miniCal.month--;
    if (miniCal.month < 0) { miniCal.month = 11; miniCal.year--; }
    renderMiniCal();
  });

  document.getElementById('miniNext').addEventListener('click', () => {
    miniCal.month++;
    if (miniCal.month > 11) { miniCal.month = 0; miniCal.year++; }
    renderMiniCal();
  });

  document.getElementById('saveEvBtn').addEventListener('click', saveEvent);
  document.getElementById('cancelEvBtn').addEventListener('click', closeModal);
  document.getElementById('deleteEvBtn').addEventListener('click', deleteEvent);

  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('modalOverlay').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.activeElement.id !== 'evMemo') saveEvent();
  });

  // ── Init ──
  initColorPicker();
  render();
</script>
</body>
</html>
