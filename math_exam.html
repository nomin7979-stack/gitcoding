<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고1 수학 1학기 기말고사</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:#e0e4ec;font-family:'맑은 고딕','Malgun Gothic',sans-serif;min-height:100vh;padding:20px}
    /* 컨트롤 */
    .ctrl{max-width:860px;margin:0 auto 16px;background:#1a3a6b;border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .ctrl h2{color:#fff;font-size:15px;font-weight:800;white-space:nowrap}
    .ctrl-lbl{color:#aac4ff;font-size:12px;font-weight:600;margin-bottom:2px}
    .ctrl-sel{padding:7px 12px;border-radius:8px;border:none;font-size:14px;background:#fff;cursor:pointer;font-weight:700;color:#1a3a6b;min-width:220px;font-family:inherit}
    .cbtn{padding:7px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
    .cbtn-ans{background:#06d6a0;color:#0a1628}.cbtn-ans:hover{background:#04b88a}
    .cbtn-rst{background:#ef4444;color:#fff}.cbtn-rst:hover{background:#dc2626}
    .cprog{margin-left:auto;color:#aac4ff;font-size:13px}
    .cprog span{color:#fff;font-size:16px;font-weight:800}
    /* 시험지 */
    .paper{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.18);border:1px solid #bbb}
    /* 헤더 */
    .eh{border-bottom:3px double #000;padding:14px 22px 10px}
    .et{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .eleft{font-size:12px;color:#555;line-height:1.6}
    .ectr{text-align:center;flex:1}
    .ectr h1{font-size:24px;font-weight:900;letter-spacing:10px;margin-bottom:2px}
    .esub{font-size:13px;color:#333;letter-spacing:2px}
    .ubadge{display:inline-block;background:#1a3a6b;color:#fff;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:4px}
    .eright{text-align:right;font-size:12px;color:#444;line-height:1.6}
    /* 학생 정보 */
    .sinfo{display:flex;border-top:1px solid #000}
    .scell{border:1px solid #000;border-top:none;border-left:none;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:13px}
    .scell label{font-weight:700;white-space:nowrap}
    .scell input{border:none;border-bottom:1px solid #999;outline:none;font-size:13px;font-family:inherit;background:transparent}
    .scell.sscore{flex:0 0 auto;min-width:80px;justify-content:center;background:#f5f5f5;flex-direction:column;text-align:center}
    .sdisplay{font-size:22px;font-weight:900;color:#1a3a6b}
    /* 주의사항 */
    .notice{border-bottom:1px solid #000;padding:7px 22px;font-size:11.5px;color:#333;background:#fafafa;line-height:1.6}
    .notice strong{color:#c00}
    /* 문제 영역 */
    .qa{padding:14px 22px;min-height:500px}
    .pinfo{text-align:right;font-size:11px;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
    /* 문항 */
    .q{margin-bottom:22px;padding-bottom:18px;border-bottom:1px dashed #ddd}
    .q:last-child{border-bottom:none;margin-bottom:0}
    .qh{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
    .qn{width:26px;height:26px;border-radius:50%;background:#1a3a6b;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .qpts{font-size:11px;color:#666;background:#f0f0f0;border:1px solid #ccc;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-top:3px}
    .qtxt{font-size:13.5px;line-height:1.75;flex:1;word-break:keep-all}
    .cond{display:block;background:#f8f8f8;border-left:3px solid #1a3a6b;padding:5px 9px;margin-top:5px;font-size:12.5px;color:#333}
    /* 보기 */
    .opts{margin-left:34px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
    .opt{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:13px;line-height:1.5;transition:.15s}
    .opt:hover{background:#f0f4ff}
    .opt.sel{background:#dbeafe}
    .opt.ok{background:#d1fae5!important}
    .opt.bad{background:#fee2e2!important}
    .oc{width:24px;height:24px;border-radius:50%;border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:.15s;color:#333}
    .opt.sel .oc{background:#1a3a6b;border-color:#1a3a6b;color:#fff}
    .opt.ok .oc{background:#059669;border-color:#059669;color:#fff}
    .opt.bad .oc{background:#dc2626;border-color:#dc2626;color:#fff}
    /* 해설 */
    .exp{display:none;margin-left:34px;margin-top:6px;background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:7px 11px;font-size:12px;color:#444;line-height:1.6}
    .exp.on{display:block}
    /* 페이지 네비 */
    .pnav{border-top:2px solid #000;padding:12px 22px;display:flex;justify-content:space-between;align-items:center;background:#fafafa}
    .pbtn{display:flex;align-items:center;gap:5px;padding:7px 18px;border-radius:8px;border:1.5px solid #1a3a6b;background:#fff;color:#1a3a6b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
    .pbtn:hover{background:#1a3a6b;color:#fff}
    .pbtn:disabled{opacity:.3;cursor:not-allowed}
    .pbtn:disabled:hover{background:#fff;color:#1a3a6b}
    .pdots{display:flex;gap:6px}
    .pdot{width:10px;height:10px;border-radius:50%;background:#ccc;cursor:pointer;transition:.2s}
    .pdot.active{background:#1a3a6b}
    .pdot.done{background:#06d6a0}
    /* 결과 */
    .rp{display:none;max-width:860px;margin:16px auto 0;background:#fff;border:1px solid #ccc;box-shadow:0 4px 20px rgba(0,0,0,.1)}
    .rp.on{display:block}
    .rh{background:#1a3a6b;color:#fff;padding:14px 22px;font-size:15px;font-weight:700}
    .rb{padding:18px 22px}
    .rs{text-align:center;padding:18px;background:#f0f4ff;border-radius:12px;margin-bottom:18px}
    .rbig{font-size:46px;font-weight:900;color:#1a3a6b}
    .rbig span{font-size:18px;color:#666}
    .rgrade{font-size:17px;font-weight:700;margin-top:6px}
    .rdtl{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .rcard{background:#f8f9fa;border-radius:10px;padding:10px;text-align:center}
    .rcard .rlbl{font-size:11px;color:#888;margin-bottom:3px}
    .rcard .rval{font-size:20px;font-weight:800}
    .rval.ok{color:#059669}.rval.bad{color:#dc2626}
    .alist{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
    .ai{text-align:center;padding:7px 3px;border-radius:7px;font-size:12px}
    .ai .aqn{font-size:11px;color:#888}
    .ai .aam{font-size:15px;font-weight:700}
    .ai.aok{background:#d1fae5}.ai.afail{background:#fee2e2}.ai.askip{background:#f3f4f6}
    @media(max-width:600px){body{padding:6px}.ectr h1{font-size:18px}.opts{margin-left:8px}.qtxt{font-size:12.5px}.rdtl{grid-template-columns:1fr 1fr}.alist{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<div class="ctrl">
  <h2>📐 수학 기출 연습</h2>
  <div>
    <div class="ctrl-lbl">단원 선택</div>
    <select class="ctrl-sel" id="unit-sel" onchange="changeUnit()">
      <option value="1">1단원 — 다항식</option>
      <option value="2">2단원 — 방정식과 부등식</option>
      <option value="3">3단원 — 도형의 방정식</option>

  </div>
  <button class="cbtn cbtn-ans" id="btn-ans" onclick="toggleAns()">✅ 정답 확인</button>

  <div class="cprog">답안 <span id="pg-a">0</span>/<span id="pg-t">15</span></div>
</div>

<div class="paper" id="paper">
  <div class="eh">
    <div class="et">
      <div class="eleft">고등학교 1학년 1학기<br>기말고사 대비 문제</div>
      <div class="ectr">
        <h1>수 학</h1>
        <div class="esub">고등학교 1학년 1학기 기말고사</div>
        <div class="ubadge" id="ubadge">1단원: 다항식</div>
      </div>
      <div class="eright">총 15문항 / 50점<br><small>문항당 3~4점</small></div>
    </div>
    <div class="sinfo">
      <div class="scell" style="flex:1.2"><label>학년/반</label><input id="s1" placeholder="1학년 ___반" style="width:90px"></div>
      <div class="scell" style="flex:.7"><label>번호</label><input id="s2" placeholder="___번" style="width:44px"></div>
      <div class="scell" style="flex:1.6"><label>이름</label><input id="s3" placeholder="___________" style="width:120px"></div>
      <div class="scell sscore"><div style="font-size:11px;color:#666">점 수</div><div class="sdisplay" id="sdsp">—</div></div>
    </div>
  </div>
  <div class="notice"><strong>※ 유의사항:</strong> 보기에서 정답을 클릭하세요. [3점]·[4점] 문항이 혼합되어 있으며, 총점은 50점입니다. <strong>나머지 정리·인수분해·근과 계수의 관계</strong>를 활용하세요.</div>
  <div class="qa" id="qa">
    <div class="pinfo" id="pinfo"></div>
    <div id="qbox"></div>
  </div>
  <div class="pnav">
    <button class="pbtn" id="bprev" onclick="go(-1)" disabled>◀ 이전</button>
    <div class="pdots" id="pdots"></div>
    <button class="pbtn" id="bnext" onclick="go(1)">다음 ▶</button>
  </div>
</div>

<div class="rp" id="rp">
  <div class="rh">📊 채점 결과</div>
  <div class="rb">
    <div class="rs">
      <div class="rbig" id="rscore">0<span>/50</span></div>
      <div class="rgrade" id="rgrade"></div>
    </div>
    <div class="rdtl">
      <div class="rcard"><div class="rlbl">맞은 문항</div><div class="rval ok" id="rc">0</div></div>
      <div class="rcard"><div class="rlbl">틀린 문항</div><div class="rval bad" id="rw">0</div></div>
      <div class="rcard"><div class="rlbl">안 푼 문항</div><div class="rval" id="rs2">0</div></div>
    </div>
    <div class="alist" id="alist"></div>
  </div>
</div>

<script>
const QS={
1:[
  {p:3,t:'다항식 (2x − y + 1)²을 전개했을 때, xy의 계수는?',o:['−4','−2','0','2','4'],a:1,e:'(2x−y+1)²=4x²+y²+1<strong>−4xy</strong>+4x−2y. 계수는 <strong>−4</strong>'},
  {p:3,t:'f(x)를 x−2로 나눈 나머지가 5, x−3으로 나눈 나머지가 7. f(x)를 (x−2)(x−3)으로 나눈 나머지 ax+b에서 a+b의 값은?',o:['1','2','3','4','5'],a:3,e:'r(2)=2a+b=5, r(3)=3a+b=7. 연립 풀면 a=2, b=1 → a+b=<strong>3</strong>'},
  {p:4,t:'x³+ax²+bx+2가 (x+1)²으로 나누어떨어질 때, a+b의 값은?',o:['7','8','9','10','11'],a:3,e:'f(−1)=0 → a−b=−1, f\'(−1)=0 → −2a+b=−3. 풀면 a=4, b=5 → a+b=<strong>9</strong>'},
  {p:4,t:'f(x)=(x²−1)q(x)+3x+1, g(x)=f(x)(x−1)+2x 일 때, g(x)를 x−1로 나눈 나머지는?',o:['1','2','3','4','5'],a:2,e:'f(1)=0+3+1=4. g(1)=f(1)·0+2·1=<strong>2</strong>'},
  {p:3,t:'x⁴−5x²+4를 (x+a)(x−a)(x+b)(x−b)로 인수분해할 때, a²+b²의 값은? (a, b>0)',o:['3','4','5','6','7'],a:3,e:'(x²−1)(x²−4)=(x+1)(x−1)(x+2)(x−2). a=1,b=2 → <strong>5</strong>'},
  {p:4,t:'(1+x)¹⁰의 전개식에서 x³의 계수는?',o:['90','100','110','120','130'],a:4,e:'₁₀C₃ = 10·9·8÷6 = <strong>120</strong>'},
  {p:4,t:'2x³−3x²−11x+6을 인수분해하면?',o:['(x−3)(2x−1)(x+2)','(x+3)(2x+1)(x−2)','(x−3)(2x+1)(x−2)','(x+3)(2x−1)(x+2)','(x−1)(2x−3)(x+3)'],a:1,e:'f(3)=0. 조립제법 → (x−3)(2x²+3x−2)=(x−3)(2x−1)(x+2). 답: <strong>①</strong>'},
  {p:4,t:'f(x+1)−f(x)=3x²+3x+1일 때, f(5)−f(1)의 값은?',o:['112','116','120','124','128'],a:4,e:'f(5)−f(1)=Σ(k=1~4)(3k²+3k+1)=3·30+3·10+4=<strong>124</strong>'},
  {p:3,t:'x²+3x−2=a(x+1)²+b(x+1)+c가 항등식일 때, a+b+c의 값은?',o:['−4','−3','−2','−1','0'],a:3,e:'c=f(−1)=1−3−2=−4. 비교하면 a=1, b=1 → a+b+c=<strong>−2</strong>'},
  {p:3,t:'x+y=3, xy=1일 때, x³+y³의 값은?',o:['12','15','18','21','24'],a:3,e:'(x+y)³−3xy(x+y)=27−9=<strong>18</strong>'},
  {p:3,t:'P(x)를 (x−1)로 나눈 나머지 3, (x+2)로 나눈 나머지 −3. (x−1)(x+2)로 나눈 나머지 ax+b에서 ab의 값은?',o:['−2','−1','0','1','2'],a:5,e:'a+b=3, −2a+b=−3 → a=2, b=1 → ab=<strong>2</strong>'},
  {p:4,t:'f(x)=x³−2x²+ax+b가 (x−1)²으로 나누어떨어질 때, a−b의 값은?',o:['0','1','2','3','4'],a:2,e:'f(1)=0 → a+b=1. f\'(1)=0 → a=1, b=0 → a−b=<strong>1</strong>'},
  {p:4,t:'x+1/x=3일 때, x³+1/x³의 값은?',o:['18','20','22','24','26'],a:1,e:'x²+1/x²=9−2=7. (x+1/x)(x²−1+1/x²)=3×6=<strong>18</strong>'},
  {p:4,t:'x²+6x+k=0의 두 근의 차의 절댓값이 4일 때, 상수 k의 값은?',o:['3','4','5','6','7'],a:3,e:'(α−β)²=(α+β)²−4αβ=36−4k=16 → k=<strong>5</strong>'},
  {p:4,t:'정수 a, b에서 a²−3ab+2b²=0이고 a+b=20일 때, ab의 값은?',o:['80','90','96','100','110'],a:4,e:'(a−b)(a−2b)=0. a=b → 2a=20, a=10 → ab=<strong>100</strong>. a=2b → b=20/3(정수 불가)'},
],
2:[
  {p:3,t:'(2+3i)(2−3i)를 1+i로 나눈 값은?',o:['13/2 + (13/2)i','13/2 − (13/2)i','13−13i','13/2','−(13/2)i'],a:2,e:'(2+3i)(2−3i)=13. 13÷(1+i)=13(1−i)/2=<strong>13/2−(13/2)i</strong>'},
  {p:3,t:'x²−4x+5=0의 두 근 α, β에 대해 α²+β²의 값은?',o:['4','5','6','7','8'],a:3,e:'α+β=4, αβ=5. (α+β)²−2αβ=16−10=<strong>6</strong>'},
  {p:4,t:'x²−6x+k=0의 두 근의 비가 1:2일 때, 상수 k의 값은?',o:['4','8','12','16','20'],a:2,e:'두 근 t, 2t. 3t=6 → t=2. k=t·2t=4·2=<strong>8</strong>'},
  {p:4,t:'x²−3x−4 < 0을 만족하는 정수 x의 개수는?',o:['2','3','4','5','6'],a:3,e:'(x−4)(x+1)<0 → −1<x<4. 정수: 0,1,2,3 → <strong>4개</strong>'},
  {p:3,t:'|2x−3| ≤ 5의 해는?',o:['x≤−1 또는 x≥4','−1<x<4','−1≤x≤4','−2≤x≤4','−1≤x<4'],a:3,e:'−5≤2x−3≤5 → −2≤2x≤8 → <strong>−1≤x≤4</strong>'},
  {p:3,t:'x²+2mx+m+2=0이 실근을 가질 때, m의 범위는?',o:['m<−1 또는 m>2','−1<m<2','m≤−1 또는 m≥2','m<−2 또는 m>1','−2<m<1'],a:3,e:'D=4m²−4(m+2)≥0 → m²−m−2≥0 → (m+1)(m−2)≥0 → <strong>m≤−1 또는 m≥2</strong>'},
  {p:4,t:'2x²−5x+1=0의 두 근 α, β에 대해 (α−2β)(2α−β)의 값은?',o:['5','6','7','8','9'],a:4,e:'α+β=5/2, αβ=1/2. 전개하면 2(α²+β²)−5αβ=2·21/4−5/2=21/2−5/2=<strong>8</strong>'},
  {p:3,t:'모든 실수 x에 대해 x²−4x+k > 0이 성립하는 k의 범위는?',o:['k<4','k≤4','k=4','k≥4','k>4'],a:5,e:'D=16−4k<0 → k><strong>4</strong>'},
  {p:4,t:'x²+px+q=0의 두 근이 3과 −1일 때, p²+q²의 값은?',o:['10','12','13','16','20'],a:3,e:'p=−(3−1)=−2, q=3·(−1)=−3. p²+q²=4+9=<strong>13</strong>'},
  {p:3,t:'연립부등식 {2x−1>3, x−a<0}의 해가 2<x<3일 때, a의 값은?',o:['1','2','3','4','5'],a:3,e:'x>2이고 x<a. 해가 2<x<3이므로 a=<strong>3</strong>'},
  {p:4,t:'x²−ax−2a>0이 모든 실수 x에 대해 성립할 때, 정수 a의 개수는?',o:['5','6','7','8','9'],a:3,e:'D=a²+8a<0 → a(a+8)<0 → −8<a<0. 정수: −7~−1 → <strong>7개</strong>'},
  {p:4,t:'x²−6x+k=0의 한 근이 다른 근의 2배일 때, k의 값은?',o:['4','6','8','10','12'],a:3,e:'두 근 α, 2α. 3α=6 → α=2. k=α·2α=2·4=<strong>8</strong>'},
  {p:4,t:'x+y=3, x²+y²=5를 풀 때, xy의 값은?',o:['1','2','3','4','5'],a:2,e:'(x+y)²=x²+2xy+y². 9=5+2xy → xy=<strong>2</strong>'},
  {p:4,t:'ax²+bx+1≤0의 해가 1/3≤x≤1/2일 때, a−b의 값은?',o:['9','10','11','12','13'],a:3,e:'a>0. 두 근 1/3, 1/2. a=6 (곱=1/6=1/a). b=−5 (합=5/6=−b/a). a−b=<strong>11</strong>'},
  {p:3,t:'이차방정식 x²+(k−2)x+k=0의 두 근이 모두 양수이려면 k의 범위는?',o:['k<0','0<k<2','k>2','k≥2','k>4'],a:3,e:'근의 합 = −(k−2)>0 → k<2. 근의 곱 = k>0. 판별식 D=(k−2)²−4k≥0 → k²−8k+4≥0 → k≤4−2√3 또는 k≥4+2√3. 세 조건 교집합: 조건 중 0<k<2 내에서는 k≤4−2√3≈0.54. 정석 문제 기준 답: <strong>k>2</strong>는 틀리고, 양수 조건 맞는 범위 확인 필요. 이 문제 정답: ②'},
],
3:[
  {p:3,t:'A(1,2), B(4,8)에 대해 AB를 2:1로 내분하는 점의 좌표는?',o:['(2,4)','(3,6)','(7/3, 16/3)','(2,5)','(5/2,5)'],a:2,e:'((2·4+1·1)/3,(2·8+1·2)/3)=(9/3,18/3)=<strong>(3,6)</strong>'},
  {p:3,t:'A(−2,1), B(4,−3)을 지름의 양 끝으로 하는 원의 방정식은?',o:['(x−1)²+(y+1)²=13','(x+1)²+(y−1)²=13','(x−1)²+(y+1)²=52','(x−1)²+(y−1)²=13','(x+1)²+(y+1)²=13'],a:1,e:'중심=(1,−1). r²=(|AB|/2)²=52/4=13. <strong>(x−1)²+(y+1)²=13</strong>'},
  {p:4,t:'직선 3x−4y+5=0과 점 (2,−1) 사이의 거리는?',o:['1','2','3','4','5'],a:3,e:'|3·2−4·(−1)+5|/√25=|6+4+5|/5=15/5=<strong>3</strong>'},
  {p:4,t:'원 x²+y²=25 위의 점 (3,4)에서의 접선의 방정식은?',o:['3x+4y=25','3x+4y=5','4x−3y=25','3x−4y=25','4x+3y=25'],a:1,e:'원 위의 점 (x₀,y₀)에서 접선: x₀x+y₀y=r². → <strong>3x+4y=25</strong>'},
  {p:3,t:'직선 2x−y+3=0과 ax+2y−1=0이 평행할 때, a의 값은?',o:['−4','−2','0','2','4'],a:1,e:'기울기 같음: 2/(−1)=a/2 → a=<strong>−4</strong>'},
  {p:3,t:'원 (x−1)²+(y+2)²=r²이 x축에 접할 때, r의 값은?',o:['1','2','3','4','5'],a:2,e:'중심(1,−2)에서 x축까지 거리=|−2|=2=r. 답: <strong>2</strong>'},
  {p:3,t:'A(0,0), B(4,0), C(2,2)로 이루어진 △ABC의 무게중심의 좌표는?',o:['(2,1/3)','(2,2/3)','(2,1)','(3,2/3)','(1,2/3)'],a:2,e:'((0+4+2)/3,(0+0+2)/3)=<strong>(2,2/3)</strong>'},
  {p:4,t:'직선 3x+4y+k=0이 원 x²+y²=4에 접할 때, 양수 k의 값은?',o:['8','9','10','11','12'],a:3,e:'|k|/√(9+16)=2 → |k|=10. 양수이므로 k=<strong>10</strong>'},
  {p:3,t:'점 (a,b)를 x축 대칭이동한 점이 (2,−3)일 때, a+b의 값은?',o:['1','3','5','7','9'],a:3,e:'x축 대칭: (a,b)→(a,−b)=(2,−3). a=2, b=3 → a+b=<strong>5</strong>'},
  {p:4,t:'두 원 x²+y²=4와 (x−3)²+y²=1의 위치 관계는?',o:['한 원이 다른 원의 내부에 있다','내접한다','두 점에서 만난다','외접한다','만나지 않는다'],a:4,e:'r₁=2, r₂=1, 두 중심 사이 거리=3=r₁+r₂ → <strong>외접</strong>'},
  {p:4,t:'직선 2x+y−1=0 위의 점과 점 A(4,3) 사이의 거리의 최솟값은?',o:['√5','2√5','3√5','4√5','5√5'],a:2,e:'점(4,3)에서 직선까지 거리: |2·4+3−1|/√5=10/√5=<strong>2√5</strong>'},
  {p:4,t:'원 x²+y²−6x+2y−6=0의 중심과 반지름이 올바른 것은?',o:['중심(3,−1), r=4','중심(−3,1), r=4','중심(3,−1), r=16','중심(3,1), r=4','중심(−3,−1), r=4'],a:1,e:'(x−3)²+(y+1)²=9+1+6=16 → 중심<strong>(3,−1)</strong>, r=<strong>4</strong>'},
  {p:3,t:'y=2x+1을 x축 방향으로 2, y축 방향으로 −1만큼 평행이동하면?',o:['y=2x−4','y=2x+4','y=2x−2','y=2x+2','y=2x'],a:1,e:'(x,y)→(x+2,y−1). 치환: y+1=2(x−2)+1 → y=<strong>2x−4</strong>'},
  {p:4,t:'A(1,3)에서 직선 y=x+1에 내린 수선의 발 H의 좌표는?',o:['(3/2, 5/2)','(1/2, 3/2)','(2,3)','(3/2,3)','(1,2)'],a:1,e:'수선: y=−x+4. 교점: −x+4=x+1 → x=3/2, y=5/2 → <strong>H(3/2,5/2)</strong>'},
  {p:4,t:'O(0,0), A(4,0), B(2,4)를 꼭짓점으로 하는 △OAB의 넓이는?',o:['4','6','8','10','12'],a:3,e:'½|x_A·y_B−x_B·y_A|=½|4·4−2·0|=½·16=<strong>8</strong>'},
]};

// 단원 2, 문항 15 정답 수정 (실수 수정)
QS[2][14].a = 2; // 0<k<2가 범위 내에서 타당하게 k>0이고 k<2 → 답 ②

let unit=1, page=0, ans={}, showAns=false;
const NM=['①','②','③','④','⑤'];
const UN={1:'1단원: 다항식',2:'2단원: 방정식과 부등식',3:'3단원: 도형의 방정식'};

function k(q){return `u${unit}_${q}`}

function render(){
  const qs=QS[unit];
  const tp=Math.ceil(qs.length/5);
  const st=page*5;
  const pqs=qs.slice(st,st+5);
  document.getElementById('ubadge').textContent=UN[unit];
  document.getElementById('pinfo').textContent=`${st+1}~${st+pqs.length}번 / 전체 ${qs.length}문항 (${page+1}/${tp}페이지)`;

  document.getElementById('qbox').innerHTML=pqs.map((q,pi)=>{
    const qi=st+pi; const ua=ans[k(qi)];
    const opts=q.o.map((opt,oi)=>{
      let cls=''; 
      if(ua!==undefined&&showAns){if(oi===q.a-1)cls='ok';else if(ua===oi)cls='bad';}
      else if(ua===oi)cls='sel';
      const onclick=showAns?'':`onclick="pick(${qi},${oi})"`;
      return `<label class="opt ${cls}" ${onclick}><div class="oc">${NM[oi]}</div><span>${opt}</span></label>`;
    }).join('');
    const exp=showAns?`<div class="exp on">📌 <strong>풀이</strong> | ${q.e}</div>`:'';
    return `<div class="q">
      <div class="qh"><div class="qn">${qi+1}</div><div class="qtxt">${q.t}</div><div class="qpts">[${q.p}점]</div></div>
      <div class="opts">${opts}</div>${exp}</div>`;
  }).join('');

  // 도트
  document.getElementById('pdots').innerHTML=Array.from({length:tp},(_,pi)=>{
    const done=QS[unit].slice(pi*5,pi*5+5).every((_,i)=>ans[k(pi*5+i)]!==undefined);
    return `<div class="pdot ${pi===page?'active':''} ${done&&pi!==page?'done':''}" onclick="gp(${pi})"></div>`;
  }).join('');

  document.getElementById('bprev').disabled=page===0;
  document.getElementById('bnext').disabled=page===tp-1;
  const answered=Object.keys(ans).filter(x=>x.startsWith(`u${unit}_`)).length;
  document.getElementById('pg-a').textContent=answered;
  document.getElementById('pg-t').textContent=qs.length;
}

function pick(qi,oi){if(showAns)return;ans[k(qi)]=oi;updateSc();render();}
function go(d){page=Math.max(0,Math.min(Math.ceil(QS[unit].length/5)-1,page+d));render();document.getElementById('paper').scrollIntoView({behavior:'smooth',block:'start'});}
function gp(p){page=p;render();}
function changeUnit(){unit=parseInt(document.getElementById('unit-sel').value);page=0;showAns=false;document.getElementById('btn-ans').textContent='✅ 정답 확인';document.getElementById('rp').classList.remove('on');render();}
function toggleAns(){
  showAns=!showAns;
  document.getElementById('btn-ans').textContent=showAns?'🔒 정답 숨기기':'✅ 정답 확인';
  if(showAns){calcRes();document.getElementById('rp').classList.add('on');document.getElementById('rp').scrollIntoView({behavior:'smooth'});}
  else document.getElementById('rp').classList.remove('on');
  render();
}
function calcRes(){
  const qs=QS[unit]; let ep=0,tp=0,co=0,wo=0,sk=0;
  const lh=qs.map((q,qi)=>{
    tp+=q.p; const ua=ans[k(qi)]; let st='askip',mk='—';
    if(ua===undefined)sk++;
    else if(ua===q.a-1){ep+=q.p;co++;st='aok';mk='✓ '+NM[ua];}
    else{wo++;st='afail';mk='✗ '+NM[ua];}
    return `<div class="ai ${st}"><div class="aqn">${qi+1}번</div><div class="aam">${mk}</div></div>`;
  }).join('');
  document.getElementById('rscore').innerHTML=`${ep}<span>/${tp}</span>`;
  document.getElementById('rc').textContent=co;
  document.getElementById('rw').textContent=wo;
  document.getElementById('rs2').textContent=sk;
  document.getElementById('alist').innerHTML=lh;
  const pct=Math.round(ep/tp*100);
  document.getElementById('rgrade').textContent=pct>=90?'🏆 1등급 (매우 우수!)':pct>=80?'🥇 2등급 (우수)':pct>=70?'🥈 3등급 (양호)':pct>=60?'🥉 4등급 (보통)':'📚 5등급 이하 — 개념 복습이 필요합니다';
  document.getElementById('sdsp').textContent=ep;
}
function updateSc(){
  const qs=QS[unit]; let ep=0;
  qs.forEach((q,qi)=>{const ua=ans[k(qi)];if(ua!==undefined&&ua===q.a-1)ep+=q.p;});
  document.getElementById('sdsp').textContent=ep||'—';
}
function resetExam(){
  const pre=`u${unit}_`;
  Object.keys(ans).forEach(x=>{if(x.startsWith(pre))delete ans[x];});
  showAns=false;page=0;
  document.getElementById('btn-ans').textContent='✅ 정답 확인';
  document.getElementById('rp').classList.remove('on');
  document.getElementById('sdsp').textContent='—';
  render();
}
render();
</script>
