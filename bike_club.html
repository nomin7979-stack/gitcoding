<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏍️ 바이크 동호회</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #e53e3e;
            --primary-dark: #c53030;
            --primary-light: #fed7d7;
            --secondary: #2d3748;
            --accent: #ed8936;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #1a202c;
            --text-light: #718096;
            --border: #e2e8f0;
            --success: #38a169;
            --warning: #d69e2e;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--secondary) 0%, #1a202c 100%);
            color: white;
            padding: 16px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-logo {
            font-size: 28px;
        }

        .header-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .header-btn:hover { background: rgba(255,255,255,0.25); }

        /* Main Content */
        .main-content {
            padding: 76px 16px 90px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Section */
        .section { display: none; }
        .section.active { display: block; }

        /* Home Section */
        .welcome-banner {
            background: linear-gradient(135deg, var(--primary) 0%, #9b2c2c 100%);
            color: white;
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::after {
            content: '🏍️';
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 60px;
            opacity: 0.3;
        }

        .welcome-banner h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .welcome-banner p {
            font-size: 14px;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-card .stat-label {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .card-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-upcoming {
            background: #ebf8ff;
            color: #2b6cb0;
        }

        .badge-done {
            background: #f0fff4;
            color: #276749;
        }

        .badge-notice {
            background: var(--primary-light);
            color: var(--primary);
        }

        .badge-urgent {
            background: #fff5f5;
            color: #c53030;
        }

        .card-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--text-light);
        }

        .card-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 10px;
            line-height: 1.6;
        }

        /* Member Cards */
        .member-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .member-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .member-info { flex: 1; }

        .member-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .member-role {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .role-leader {
            background: #fefcbf;
            color: #975a16;
        }

        .role-manager {
            background: #e9d8fd;
            color: #553c9a;
        }

        .role-member {
            background: #e2e8f0;
            color: #4a5568;
        }

        .member-details {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            gap: 10px;
        }

        .member-bike {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .gallery-item {
            aspect-ratio: 1;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
        }

        .gallery-item:hover { opacity: 0.8; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            padding: 8px 6px 6px;
            font-size: 10px;
        }

        /* Route Cards */
        .route-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .route-title {
            font-size: 16px;
            font-weight: 600;
        }

        .route-difficulty {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .diff-easy { background: #f0fff4; color: #276749; }
        .diff-medium { background: #fffff0; color: #975a16; }
        .diff-hard { background: #fff5f5; color: #c53030; }

        .route-path {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .route-point {
            background: #edf2f7;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .route-arrow { color: var(--primary); font-weight: 700; }

        .route-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-light);
        }

        .route-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 12px;
            font-family: inherit;
            color: var(--text-light);
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--primary); }

        .nav-item .nav-icon {
            font-size: 22px;
            line-height: 1;
        }

        .nav-item .nav-label {
            font-size: 10px;
            font-weight: 600;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 62, 62, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 90;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(229, 62, 62, 0.5);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
            background: #f7fafc;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            background: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
            margin-top: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-danger {
            background: #fff5f5;
            color: #c53030;
            border: 2px solid #fed7d7;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 8px;
            width: auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--border);
            color: var(--text-light);
            border: none;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--secondary);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 300;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Attendance */
        .attendance-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .attendance-chip {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .attendance-chip.going {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #c6f6d5;
        }

        .attendance-chip.not-going {
            background: #edf2f7;
            color: #718096;
            border: 1px solid var(--border);
        }

        /* Profile Section */
        .profile-header {
            text-align: center;
            padding: 20px;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-bike-info {
            color: var(--text-light);
            font-size: 14px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .profile-stat {
            background: var(--card);
            padding: 16px;
            text-align: center;
        }

        .profile-stat .p-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .profile-stat .p-label {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .menu-list {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            font-size: 15px;
            color: var(--text);
        }

        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: #f7fafc; }

        .menu-item .menu-icon { font-size: 20px; }
        .menu-item .menu-arrow {
            margin-left: auto;
            color: var(--text-light);
        }

        /* Weather widget */
        .weather-widget {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 16px 18px;
            color: white;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .weather-left { display: flex; align-items: center; gap: 12px; }
        .weather-icon { font-size: 36px; }
        .weather-temp { font-size: 28px; font-weight: 700; }
        .weather-desc { font-size: 12px; opacity: 0.9; }
        .weather-riding {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .weather-good { background: rgba(56, 161, 105, 0.3); }
        .weather-bad { background: rgba(229, 62, 62, 0.3); }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: var(--card);
        }

        .search-box input:focus { border-color: var(--primary); }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* Detail view */
        .detail-back {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--primary);
            cursor: pointer;
            margin-bottom: 16px;
            background: none;
            border: none;
            font-family: inherit;
            font-weight: 600;
        }

        /* Actions row */
        .actions-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: 2px solid var(--border);
            background: white;
            color: var(--text);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.joined {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Comment */
        .comment {
            display: flex;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .comment-content { flex: 1; }
        .comment-name { font-size: 13px; font-weight: 600; }
        .comment-text { font-size: 14px; margin-top: 4px; line-height: 1.5; }
        .comment-time { font-size: 11px; color: var(--text-light); margin-top: 4px; }

        .comment-input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .comment-input-area input:focus { border-color: var(--primary); }

        .comment-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="header-logo">🏍️</span>
            <h1>라이더스 클럽</h1>
        </div>
        <button class="header-btn" onclick="showNotifications()">🔔</button>
    </header>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Home Section -->
        <div class="section active" id="section-home">
            <div class="welcome-banner">
                <h2 id="welcomeText">안녕하세요! 👋</h2>
                <p>오늘도 안전한 라이딩 되세요</p>
            </div>

            <div class="weather-widget">
                <div class="weather-left">
                    <span class="weather-icon">☀️</span>
                    <div>
                        <div class="weather-temp">26°</div>
                        <div class="weather-desc">맑음 · 습도 45%</div>
                    </div>
                </div>
                <span class="weather-riding weather-good">라이딩 적합 👍</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">

        let data;

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                data = JSON.parse(saved);
                if (!data.nextId) data.nextId = { member: 9, ride: 5, route: 6, notice: 4, gallery: 13 };
            } else {
                data = getDefaultData();
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ============ Navigation ============
        let currentSection = 'home';

        function navigate(section) {
            currentSection = section;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + section).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navMap = { home: 0, rides: 1, routes: 2, members: 3, profile: 4, gallery: 1, notices: 4 };
            const idx = navMap[section];
            if (idx !== undefined) document.querySelectorAll('.nav-item')[idx].classList.add('active');

            updateFab();
            renderSection(section);
        }

        function updateFab() {
            const fab = document.getElementById('fab');
            const hideSections = ['profile', 'ride-detail', 'notice-detail'];
            fab.style.display = hideSections.includes(currentSection) ? 'none' : 'flex';
        }

        function handleFab() {
            const modalMap = {
                home: 'addRide',
                rides: 'addRide',
                routes: 'addRoute',
                members: 'addMember',
                gallery: 'addPhoto',
                notices: 'addNotice'
            };
            openModal(modalMap[currentSection] || 'addRide');
        }

        // ============ Render ============
        function renderSection(section) {
            switch(section) {
                case 'home': renderHome(); break;
                case 'rides': renderRides(); break;
                case 'routes': renderRoutes(); break;
                case 'members': renderMembers(); break;
                case 'gallery': renderGallery(); break;
                case 'notices': renderNotices(); break;
                case 'profile': renderProfile(); break;
            }
        }

        function renderHome() {
            document.getElementById('memberCount').textContent = data.members.length;
            const now = new Date();
            const monthRides = data.rides.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            document.getElementById('rideCount').textContent = monthRides.length;
            document.getElementById('routeCount').textContent = data.routes.length;

            if (data.profile.nickname) {
                document.getElementById('welcomeText').textContent = `${data.profile.nickname}님, 안녕하세요! 👋`;
            }

            const notices = data.notices.slice(0, 2);
            document.getElementById('homeNotices').innerHTML = notices.map(n => {
                const author = data.members.find(m => m.id === n.author);
                return `
                    <div class="card" onclick="showNoticeDetail(${n.id})">
                        <div class="card-header">
                            <div class="card-title">${n.title}</div>
                            ${n.important ? '<span class="card-badge badge-urgent">중요</span>' : ''}
                        </div>
                        <div class="card-info">
                            <span>📅 ${n.date}</span>
                            <span>👤 ${author ? author.nickname : '관리자'}</span>
                        </div>
                    </div>
                `;
            }).join('');

            const upcoming = data.rides.filter(r => r.status === 'upcoming').slice(0, 2);
            document.getElementById('homeRides').innerHTML = upcoming.length ? upcoming.map(r => renderRideCard(r)).join('') :
                '<div class="empty-state"><p>예정된 라이딩이 없습니다</p></div>';
        }

        function renderRideCard(ride) {
            const badge = ride.status === 'upcoming' ? 'badge-upcoming' : 'badge-done';
            const label = ride.status === 'upcoming' ? '예정' : '완료';
            return `
                <div class="card" onclick="showRideDetail(${ride.id})">
                    <div class="card-header">
                        <div class="card-title">${ride.title}</div>
                        <span class="card-badge ${badge}">${label}</span>
                    </div>
                    <div class="card-info">
                        <span>📅 ${ride.date}</span>
                        <span>⏰ ${ride.time}</span>
                        <span>📍 ${ride.meetPoint}</span>
                    </div>
                    <div class="card-info" style="margin-top:6px">
                        <span>🛣️ ${ride.distance}km</span>
                        <span>👥 ${ride.participants.length}명 참여</span>
                    </div>
                </div>
            `;
        }

        let rideFilter = 'all';
        function filterRides(filter, btn) {
            rideFilter = filter;
            document.querySelectorAll('#section-rides .tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderRides();
        }

        function renderRides() {
            let rides = [...data.rides].sort((a, b) => new Date(b.date) - new Date(a.date));
            if (rideFilter === 'upcoming') rides = rides.filter(r => r.status === 'upcoming');
            else if (rideFilter === 'completed') rides = rides.filter(r => r.status === 'completed');

            document.getElementById('ridesList').innerHTML = rides.length ?
                rides.map(r => renderRideCard(r)).join('') :
                '<div class="empty-state"><div class="empty-icon">📅</div><p>라이딩 일정이 없습니다</p></div>';
        }

        function showRideDetail(id) {
            const ride = data.rides.find(r => r.id === id);
            if (!ride) return;

            const isJoined = ride.participants.includes(data.profile.name ? 0 : -1);

            if (filter) {

                members = members.filter(m =>
                    m.name.toLowerCase().includes(f) ||
                    m.nickname.toLowerCase().includes(f) ||
                    m.bike.toLowerCase().includes(f)

            }

            const roleMap = { leader: '회장', manager: '총무', member: '회원' };
            const roleClass = { leader: 'role-leader', manager: 'role-manager', member: 'role-member' };

                        <button class="btn btn-primary" onclick="saveProfile()">저장</button>
                        <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                    `;
                    break;
            }

            content.innerHTML = html;
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        }

        // ============ Save Functions ============
        function saveRide() {
            const name = document.getElementById('rideName').value.trim();
            const date = document.getElementById('rideDate').value;
            const time = document.getElementById('rideTime').value;
            const meet = document.getElementById('rideMeet').value.trim();
            const dest = document.getElementById('rideDest').value.trim();
            const distance = parseInt(document.getElementById('rideDistance').value) || 0;
            const desc = document.getElementById('rideDesc').value.trim();

            if (!name || !date) {
                showToast('이름과 날짜를 입력해주세요');
                return;
            }

            data.rides.push({
                id: data.nextId.ride++,
                title: name, date, time, meetPoint: meet,
                destination: dest, distance, description: desc,
                status: 'upcoming', participants: [1], comments: []
            });
            saveData();
            closeModal();
            renderSection(currentSection);
            showToast('라이딩 일정이 등록되었습니다');
        }

        function saveRoute() {
            const name = document.getElementById('routeName').value.trim();
            const points = document.getElementById('routePoints').value.split(',').map(s => s.trim()).filter(Boolean);
            const distance = parseInt(document.getElementById('routeDistance').value) || 0;
            const duration = document.getElementById('routeDuration').value.trim();
            const difficulty = document.getElementById('routeDifficulty').value;
            const desc = document.getElementById('routeDesc').value.trim();

            if (!name || points.length < 2) {
                showToast('이름과 경유지(2개 이상)를 입력해주세요');
                return;
            }

            data.routes.push({
                id: data.nextId.route++,
                name, points, distance, duration,
                difficulty, description: desc, createdBy: 1
            });
            saveData();
            closeModal();
            renderRoutes();
            showToast('코스가 등록되었습니다');
        }

        function saveMember() {
            const name = document.getElementById('memberName').value.trim();
            const nickname = document.getElementById('memberNick').value.trim();
            const phone = document.getElementById('memberPhone').value.trim();
            const bike = document.getElementById('memberBike').value.trim();
            const bikeYear = document.getElementById('memberBikeYear').value.trim();
            const role = document.getElementById('memberRole').value;

            if (!name || !nickname) {
                showToast('이름과 닉네임을 입력해주세요');
                return;
            }

            data.members.push({
                id: data.nextId.member++,
                name, nickname, phone, bike, bikeYear, role,
                avatarColor: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
                joinDate: new Date().toISOString().split('T')[0]
            });
            saveData();
            closeModal();
            renderMembers();
            showToast('회원이 추가되었습니다');
        }

        function saveNotice() {
            const title = document.getElementById('noticeTitle').value.trim();
            const content = document.getElementById('noticeContent').value.trim();
            const important = document.getElementById('noticeImportant').checked;

            if (!title || !content) {
                showToast('제목과 내용을 입력해주세요');
                return;
            }

            data.notices.unshift({
                id: data.nextId.notice++,
                title, content,
                date: new Date().toISOString().split('T')[0],
                author: 1, important, comments: []
            });
            saveData();
            closeModal();
            renderSection(currentSection);
            showToast('공지사항이 등록되었습니다');
        }

        function savePhoto() {
            const emoji = document.getElementById('photoEmoji').value;
            const category = document.getElementById('photoCategory').value;
            const caption = document.getElementById('photoCaption').value.trim();

            if (!caption) {
                showToast('설명을 입력해주세요');
                return;
            }

            data.gallery.unshift({
                id: data.nextId.gallery++,
                emoji, category, caption,
                date: new Date().toISOString().split('T')[0]
            });
            saveData();
            closeModal();
            renderGallery();
            showToast('사진이 추가되었습니다');
        }

        function saveProfile() {
            data.profile.name = document.getElementById('editName').value.trim();
            data.profile.nickname = document.getElementById('editNick').value.trim();
            data.profile.phone = document.getElementById('editPhone').value.trim();
            data.profile.bike = document.getElementById('editBike').value.trim();
            data.profile.bikeYear = document.getElementById('editBikeYear').value.trim();
            saveData();
            closeModal();
            renderProfile();
            renderHome();
            showToast('프로필이 저장되었습니다');
        }

        // ============ Edit Functions ============
        function editRide(id) {
            const ride = data.rides.find(r => r.id === id);
            openModal('addRide');
            setTimeout(() => {
                document.getElementById('rideName').value = ride.title;
                document.getElementById('rideDate').value = ride.date;
                document.getElementById('rideTime').value = ride.time;
                document.getElementById('rideMeet').value = ride.meetPoint;
                document.getElementById('rideDest').value = ride.destination;
                document.getElementById('rideDistance').value = ride.distance;
                document.getElementById('rideDesc').value = ride.description;

                const btn = document.querySelector('#modalContent .btn-primary');
                btn.textContent = '수정 완료';
                btn.onclick = function() {
                    ride.title = document.getElementById('rideName').value.trim();
                    ride.date = document.getElementById('rideDate').value;
                    ride.time = document.getElementById('rideTime').value;
                    ride.meetPoint = document.getElementById('rideMeet').value.trim();
                    ride.destination = document.getElementById('rideDest').value.trim();
                    ride.distance = parseInt(document.getElementById('rideDistance').value) || 0;
                    ride.description = document.getElementById('rideDesc').value.trim();
                    saveData();
                    closeModal();
                    showRideDetail(id);
                    showToast('라이딩 정보가 수정되었습니다');
                };
            }, 100);
        }

        function editRoute(id) {
            const route = data.routes.find(r => r.id === id);
            openModal('addRoute');
            setTimeout(() => {
                document.getElementById('routeName').value = route.name;
                document.getElementById('routePoints').value = route.points.join(', ');
                document.getElementById('routeDistance').value = route.distance;
                document.getElementById('routeDuration').value = route.duration;
                document.getElementById('routeDifficulty').value = route.difficulty;
                document.getElementById('routeDesc').value = route.description;

                const btn = document.querySelector('#modalContent .btn-primary');
                btn.textContent = '수정 완료';
                btn.onclick = function() {
                    route.name = document.getElementById('routeName').value.trim();
                    route.points = document.getElementById('routePoints').value.split(',').map(s => s.trim()).filter(Boolean);
                    route.distance = parseInt(document.getElementById('routeDistance').value) || 0;
                    route.duration = document.getElementById('routeDuration').value.trim();
                    route.difficulty = document.getElementById('routeDifficulty').value;
                    route.description = document.getElementById('routeDesc').value.trim();
                    saveData();
                    closeModal();
                    renderRoutes();
                    showToast('코스가 수정되었습니다');
                };
            }, 100);
        }

        function editNotice(id) {
            const notice = data.notices.find(n => n.id === id);
            openModal('addNotice');
            setTimeout(() => {
                document.getElementById('noticeTitle').value = notice.title;
                document.getElementById('noticeContent').value = notice.content;
                document.getElementById('noticeImportant').checked = notice.important;

                const btn = document.querySelector('#modalContent .btn-primary');
                btn.textContent = '수정 완료';
                btn.onclick = function() {
                    notice.title = document.getElementById('noticeTitle').value.trim();
                    notice.content = document.getElementById('noticeContent').value.trim();
                    notice.important = document.getElementById('noticeImportant').checked;
                    saveData();
                    closeModal();
                    showNoticeDetail(id);
                    showToast('공지사항이 수정되었습니다');
                };
            }, 100);
        }

        // ============ Utilities ============
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showNotifications() {
            const upcoming = data.rides.filter(r => r.status === 'upcoming');
            if (upcoming.length) {
                showToast(`📅 다가오는 라이딩 ${upcoming.length}건이 있습니다`);
            } else {
                showToast('새로운 알림이 없습니다');
            }
        }

        function showClubInfo() {
            showToast('라이더스 클럽 | 설립: 2020년 3월 | 회원: ' + data.members.length + '명');
        }

        function exportData() {
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bike_club_backup.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('데이터가 백업되었습니다');
        }

        // ============ Init ============
        loadData();
        renderHome();
    </script>
</body>
</html>
