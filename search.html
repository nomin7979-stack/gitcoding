<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      color: #fff;
      gap: 32px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #e0e0f0;
      text-shadow: 0 0 30px rgba(79, 70, 229, 0.5);
    }

    .logo span { color: #4f46e5; }

    /* 검색창 컨테이너 */
    .search-wrapper {
      position: relative;
      width: min(600px, 90vw);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 50px;
      padding: 14px 20px;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }

    .search-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: #666690;
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 1.1rem;
      color: #e0e0f0;
      caret-color: #4f46e5;
    }

    .search-input::placeholder { color: #555580; }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #555580;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border-radius: 50%;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: #a0a0c0; }
    .clear-btn.visible { display: flex; }

    .search-btn {
      background: #4f46e5;
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-btn:hover { background: #6c63ff; }
    .search-btn:active { transform: scale(0.97); }

    /* 추천 검색 엔진 탭 */
    .engine-tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: center;
    }

    .engine-tab {
      background: none;
      border: 1px solid #2a2a4a;
      color: #666690;
      font-size: 0.82rem;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .engine-tab:hover {
      border-color: #4f46e5;
      color: #a0a0ff;
    }

    .engine-tab.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    /* 자동완성 드롭다운 */
    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .suggestions.show { display: block; }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      cursor: pointer;
      transition: background 0.15s;
      color: #c0c0e0;
      font-size: 0.95rem;
    }

    .suggestion-item:hover,
    .suggestion-item.focused {
      background: #252545;
    }

    .suggestion-item svg {
      flex-shrink: 0;
      color: #555580;
    }

    /* 바로가기 */
    .shortcuts {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .shortcut-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: border-color 0.2s, transform 0.15s;
    }

    .shortcut:hover .shortcut-icon {
      border-color: #4f46e5;
      transform: translateY(-3px);
    }

    .shortcut-label {
      font-size: 0.75rem;
      color: #666690;
    }
  </style>
</head>
<body>

  <div class="logo">검<span>색</span></div>

  <div class="search-wrapper">
    <form class="search-box" id="searchForm" onsubmit="doSearch(event)">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="검색어를 입력하세요..."
        autocomplete="off"
        autofocus
      />
      <button type="button" class="clear-btn" id="clearBtn" onclick="clearInput()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button type="submit" class="search-btn">검색</button>
    </form>

    <div class="suggestions" id="suggestions"></div>

    <div class="engine-tabs">
      <button class="engine-tab active" onclick="setEngine('google', this)">Google</button>
      <button class="engine-tab" onclick="setEngine('naver', this)">네이버</button>
      <button class="engine-tab" onclick="setEngine('youtube', this)">YouTube</button>
      <button class="engine-tab" onclick="setEngine('github', this)">GitHub</button>
    </div>
  </div>

  <div class="shortcuts">
    <a class="shortcut" href="https://google.com" target="_blank">
      <div class="shortcut-icon">🌐</div>
      <span class="shortcut-label">Google</span>
    </a>
    <a class="shortcut" href="https://youtube.com" target="_blank">
      <div class="shortcut-icon">▶️</div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" href="https://github.com" target="_blank">
      <div class="shortcut-icon">🐙</div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" href="https://naver.com" target="_blank">
      <div class="shortcut-icon">🟢</div>
      <span class="shortcut-label">네이버</span>
    </a>
    <a class="shortcut" href="clock.html" target="_blank">
      <div class="shortcut-icon">🕐</div>
      <span class="shortcut-label">시계</span>
    </a>
  </div>

<script>
  const engines = {
    google:  q => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
    naver:   q => `https://search.naver.com/search.naver?query=${encodeURIComponent(q)}`,
    youtube: q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
    github:  q => `https://github.com/search?q=${encodeURIComponent(q)}`,
  };

  let currentEngine = 'google';
  let focusedIdx = -1;

  function setEngine(engine, btn) {
    currentEngine = engine;
    document.querySelectorAll('.engine-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('searchInput').focus();
  }

  function doSearch(e) {
    e && e.preventDefault();
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    window.open(engines[currentEngine](q), '_blank');
  }

  function clearInput() {
    const input = document.getElementById('searchInput');
    input.value = '';
    input.focus();
    document.getElementById('clearBtn').classList.remove('visible');
    hideSuggestions();
  }

  // 입력 이벤트
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    const val = input.value.trim();
    document.getElementById('clearBtn').classList.toggle('visible', val.length > 0);
    if (val.length > 1) showSuggestions(val);
    else hideSuggestions();
    focusedIdx = -1;
  });

  // 키보드 네비게이션
  input.addEventListener('keydown', e => {
    const items = document.querySelectorAll('.suggestion-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
      updateFocus(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedIdx = Math.max(focusedIdx - 1, -1);
      updateFocus(items);
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });

  function updateFocus(items) {
    items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
    if (focusedIdx >= 0) input.value = items[focusedIdx].dataset.q;
  }

  // 로컬 자동완성 (최근 검색어 기반)
  let history = JSON.parse(localStorage.getItem('searchHistory') || '[]');

  function showSuggestions(q) {
    const matches = history.filter(h => h.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
    if (matches.length === 0) { hideSuggestions(); return; }

    const box = document.getElementById('suggestions');
    box.innerHTML = matches.map(m => `
      <div class="suggestion-item" data-q="${m}" onclick="selectSuggestion('${m.replace(/'/g,"\\'")}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12 8 12 12 14 14"/><circle cx="12" cy="12" r="9"/>
        </svg>
        ${m}
      </div>`).join('');
    box.classList.add('show');
  }

  function hideSuggestions() {
    document.getElementById('suggestions').classList.remove('show');
    focusedIdx = -1;
  }

  function selectSuggestion(q) {
    input.value = q;
    hideSuggestions();
    doSearch();
  }

  // 검색 시 히스토리 저장
  document.getElementById('searchForm').addEventListener('submit', () => {
    const q = input.value.trim();
    if (q && !history.includes(q)) {
      history.unshift(q);
      history = history.slice(0, 30);
      localStorage.setItem('searchHistory', JSON.stringify(history));
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) hideSuggestions();
  });
</script>
</body>
</html>
