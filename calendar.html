<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>달력</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 24px;
    }

    .calendar-container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px;
      width: 420px;
      min-width: 320px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .nav-btn {
      background: #f0f2f5;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1rem;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .nav-btn:hover {
      background: #4f46e5;
      color: #fff;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 8px;
    }

    .weekday {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #aaa;
      padding: 4px 0;
      letter-spacing: 0.5px;
    }

    .weekday:first-child { color: #e55; }
    .weekday:last-child  { color: #55e; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.92rem;
      cursor: pointer;
      position: relative;
      color: #333;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .day:hover:not(.empty) {
      background: #ede9fe;
    }

    .day.empty {
      cursor: default;
    }

    .day.today {
      background: #4f46e5;
      color: #fff;
      font-weight: 700;
    }

    .day.today:hover {
      background: #4338ca;
    }

    .day.sunday { color: #e55; }
    .day.saturday { color: #55e; }
    .day.today { color: #fff; }

    .day.has-event::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f59e0b;
    }

    .day.today.has-event::after {
      background: #fff;
    }

    .day.selected {
      outline: 2px solid #4f46e5;
    }

    .day.today.selected {
      outline: 2px solid #fff;
    }

    /* Event Panel */
    .event-panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 28px;
      width: 300px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .event-panel h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .event-date-label {
      font-size: 0.82rem;
      color: #888;
      margin-top: -8px;
    }

    .event-input-row {
      display: flex;
      gap: 8px;
    }

    .event-input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.88rem;
      outline: none;
      transition: border 0.15s;
      color: #333;
    }

    .event-input:focus {
      border-color: #4f46e5;
    }

    .add-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .add-btn:hover {
      background: #4338ca;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f7ff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.88rem;
      color: #333;
    }

    .event-item span {
      flex: 1;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }

    .delete-btn:hover {
      color: #e55;
    }

    .no-events {
      color: #ccc;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 8px;
    }

    .today-btn {
      background: #f0f2f5;
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 0.82rem;
      color: #555;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }

    .today-btn:hover {
      background: #4f46e5;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="calendar-container">
  <div class="header">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <h2 id="monthYear"></h2>
      <button class="today-btn" id="todayBtn">오늘</button>
    </div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="weekdays">
    <div class="weekday">일</div>
    <div class="weekday">월</div>
    <div class="weekday">화</div>
    <div class="weekday">수</div>
    <div class="weekday">목</div>
    <div class="weekday">금</div>
    <div class="weekday">토</div>
  </div>
  <div class="days" id="daysGrid"></div>
</div>

<div class="event-panel">
  <h3>일정</h3>
  <div class="event-date-label" id="selectedDateLabel">날짜를 선택하세요</div>
  <div class="event-input-row">
    <input class="event-input" id="eventInput" placeholder="일정 입력..." maxlength="40" />
    <button class="add-btn" id="addEventBtn">추가</button>
  </div>
  <div class="event-list" id="eventList">
    <div class="no-events">선택된 날짜가 없습니다</div>
  </div>
</div>

<script>
  const today = new Date();
  let current = { year: today.getFullYear(), month: today.getMonth() };
  let selectedDate = null;
  const events = {};

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function render() {
    const { year, month } = current;
    const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('monthYear').textContent = `${year}년 ${monthNames[month]}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const dow = (firstDay + d - 1) % 7;
      const key = dateKey(year, month, d);
      const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
      const isSelected = selectedDate && selectedDate.y === year && selectedDate.m === month && selectedDate.d === d;

      cell.className = 'day';
      if (dow === 0) cell.classList.add('sunday');
      if (dow === 6) cell.classList.add('saturday');
      if (isToday) cell.classList.add('today');
      if (isSelected) cell.classList.add('selected');
      if (events[key] && events[key].length > 0) cell.classList.add('has-event');

      cell.textContent = d;
      cell.addEventListener('click', () => selectDate(year, month, d));
      grid.appendChild(cell);
    }
  }

  function selectDate(y, m, d) {
    selectedDate = { y, m, d };
    render();
    renderEvents();
  }

  function renderEvents() {
    const label = document.getElementById('selectedDateLabel');
    const list = document.getElementById('eventList');

    if (!selectedDate) {
      label.textContent = '날짜를 선택하세요';
      list.innerHTML = '<div class="no-events">선택된 날짜가 없습니다</div>';
      return;
    }

    const { y, m, d } = selectedDate;
    const key = dateKey(y, m, d);
    const dayNames = ['일','월','화','수','목','금','토'];
    const dow = new Date(y, m, d).getDay();
    label.textContent = `${y}년 ${m+1}월 ${d}일 (${dayNames[dow]})`;

    const evList = events[key] || [];
    list.innerHTML = '';

    if (evList.length === 0) {
      list.innerHTML = '<div class="no-events">일정이 없습니다</div>';
      return;
    }

    evList.forEach((ev, idx) => {
      const item = document.createElement('div');
      item.className = 'event-item';
      item.innerHTML = `<span>${ev}</span><button class="delete-btn" data-idx="${idx}">&#10005;</button>`;
      item.querySelector('.delete-btn').addEventListener('click', () => deleteEvent(key, idx));
      list.appendChild(item);
    });
  }

  function addEvent() {
    if (!selectedDate) return;
    const input = document.getElementById('eventInput');
    const text = input.value.trim();
    if (!text) return;

    const { y, m, d } = selectedDate;
    const key = dateKey(y, m, d);
    if (!events[key]) events[key] = [];
    events[key].push(text);
    input.value = '';
    render();
    renderEvents();
  }

  function deleteEvent(key, idx) {
    events[key].splice(idx, 1);
    if (events[key].length === 0) delete events[key];
    render();
    renderEvents();
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    current.month--;
    if (current.month < 0) { current.month = 11; current.year--; }
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    current.month++;
    if (current.month > 11) { current.month = 0; current.year++; }
    render();
  });

  document.getElementById('todayBtn').addEventListener('click', () => {
    current = { year: today.getFullYear(), month: today.getMonth() };
    selectDate(today.getFullYear(), today.getMonth(), today.getDate());
  });

  document.getElementById('addEventBtn').addEventListener('click', addEvent);

  document.getElementById('eventInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEvent();
  });

  render();
</script>
</body>
</html>
