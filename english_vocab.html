<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고졸검정고시 영어 단어장</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f172a;--card:#1e293b;--border:#334155;--accent:#3b82f6;--accent2:#22c55e;--accent3:#f59e0b;--text:#f1f5f9;--muted:#94a3b8;--danger:#ef4444}
    body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Segoe UI','Noto Sans KR',sans-serif;min-height:100vh}

    /* 헤더 */
    .header{background:linear-gradient(135deg,#1e3a8a,#3b82f6);padding:20px 24px;text-align:center}
    .header h1{font-size:22px;font-weight:800;margin-bottom:4px}
    .header p{font-size:13px;color:rgba(255,255,255,.7)}

    /* 탭 */
    .mode-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .mode-tab{flex:1;padding:14px 10px;text-align:center;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;font-family:inherit;transition:.2s}
    .mode-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .mode-tab:hover{color:var(--text)}

    /* 카테고리 선택 */
    .cat-bar{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border)}
    .cat-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.2s}
    .cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

    /* 진행 바 */
    .prog-bar{padding:10px 16px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
    .prog-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .3s}

    /* 메인 영역 */
    .main{max-width:600px;margin:0 auto;padding:16px}

    /* ── 단어 목록 모드 ── */
    .word-list{display:flex;flex-direction:column;gap:8px}
    .word-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s}
    .word-item:hover{border-color:var(--accent)}
    .word-item.memorized{border-color:var(--accent2);background:rgba(34,197,94,.06)}
    .word-num{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--muted)}
    .word-item.memorized .word-num{background:var(--accent2);color:#fff}
    .word-eng{font-size:17px;font-weight:700;color:var(--text)}
    .word-pron{font-size:13px;color:var(--accent);font-weight:600;margin-left:6px}
    .word-kor{font-size:14px;color:var(--muted);margin-top:3px}
    .word-info{flex:1}
    .word-star{font-size:20px;cursor:pointer;color:var(--border);transition:.2s;flex-shrink:0;background:none;border:none}
    .word-star.on{color:var(--accent3)}
    .word-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.2s;font-size:14px;color:transparent}
    .word-check.on{background:var(--accent2);border-color:var(--accent2);color:#fff}

    /* ── 플래시카드 모드 ── */
    .flash-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0}
    .flash-counter{font-size:14px;color:var(--muted)}
    .flash-counter span{color:var(--text);font-weight:700}
    .flash-card{width:100%;max-width:400px;height:280px;perspective:1000px;cursor:pointer}
    .flash-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
    .flash-card.flipped .flash-inner{transform:rotateY(180deg)}
    .flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .flash-front{background:linear-gradient(145deg,#1e3a8a,#2563eb);border:2px solid rgba(59,130,246,.4)}
    .flash-back{background:var(--card);border:2px solid var(--accent2);transform:rotateY(180deg)}
    .flash-eng{font-size:36px;font-weight:900;color:#fff;margin-bottom:8px}
    .flash-pron{font-size:18px;color:rgba(255,255,255,.7);font-weight:600}
    .flash-hint{font-size:12px;color:rgba(255,255,255,.4);margin-top:16px}
    .flash-kor{font-size:32px;font-weight:800;color:var(--accent2);margin-bottom:8px}
    .flash-ex{font-size:14px;color:var(--muted);text-align:center;line-height:1.5}
    .flash-btns{display:flex;gap:12px;width:100%;max-width:400px}
    .flash-btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
    .fbtn-know{background:var(--accent2);color:#fff}
    .fbtn-know:hover{background:#16a34a}
    .fbtn-dont{background:var(--danger);color:#fff}
    .fbtn-dont:hover{background:#dc2626}
    .fbtn-next{background:var(--accent);color:#fff}
    .fbtn-next:hover{background:#2563eb}
    .flash-nav{display:flex;gap:12px;width:100%;max-width:400px}
    .fnav-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
    .fnav-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* ── 퀴즈 모드 ── */
    .quiz-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0}
    .quiz-q{font-size:14px;color:var(--muted);margin-bottom:4px}
    .quiz-word{font-size:38px;font-weight:900;color:var(--accent);margin-bottom:4px}
    .quiz-pron{font-size:16px;color:var(--muted);font-weight:600;margin-bottom:16px}
    .quiz-opts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
    .quiz-opt{padding:14px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;transition:.2s}
    .quiz-opt:hover{border-color:var(--accent);background:rgba(59,130,246,.08)}
    .quiz-opt.correct{border-color:var(--accent2);background:rgba(34,197,94,.15);color:var(--accent2)}
    .quiz-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.1);color:var(--danger)}
    .quiz-result{text-align:center;padding:24px;background:var(--card);border-radius:16px;width:100%;max-width:400px}
    .quiz-score{font-size:48px;font-weight:900;color:var(--accent)}
    .quiz-score span{font-size:20px;color:var(--muted)}
    .quiz-msg{font-size:16px;font-weight:700;margin-top:8px}
    .quiz-again{margin-top:16px;padding:12px 32px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

    /* 검색 */
    .search-wrap{padding:12px 16px 0}
    .search-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:inherit;outline:none}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:var(--muted)}

    /* 통계 바 */
    .stats-bar{display:flex;gap:8px;padding:8px 0;justify-content:center}
    .stat-chip{font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
    .stat-chip strong{color:var(--text)}

    @media(max-width:480px){.flash-eng{font-size:28px}.quiz-word{font-size:30px}}
  </style>
</head>
<body>
<div class="header">
  <h1>📖 고졸검정고시 영어 단어장</h1>
  <p>기본 단어 200개 · 한글 발음 포함 · 플래시카드 & 퀴즈</p>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('list',this)">📝 단어 목록</button>
  <button class="mode-tab" onclick="setMode('flash',this)">🃏 플래시카드</button>
  <button class="mode-tab" onclick="setMode('quiz',this)">❓ 퀴즈</button>
</div>

<div class="cat-bar" id="cat-bar"></div>

<div class="prog-bar">

  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span id="prog-pct">0%</span>
</div>

<div class="main" id="main-area"></div>

const CATS=['전체',...new Set(WORDS.map(w=>w.c))];
let mode='list',curCat='전체',curFlash=0,flipped=false;
let memorized=JSON.parse(localStorage.getItem('ged_mem')||'{}');
let starred=JSON.parse(localStorage.getItem('ged_star')||'{}');
let quizIdx=0,quizScore=0,quizDone=false,quizAnswered=false,searchTerm='';

function save(){localStorage.setItem('ged_mem',JSON.stringify(memorized));localStorage.setItem('ged_star',JSON.stringify(starred))}
function filtered(){let ws=curCat==='전체'?WORDS:WORDS.filter(w=>w.c===curCat);if(curCat==='⭐ 즐겨찾기')ws=WORDS.filter(w=>starred[w.e]);if(searchTerm)ws=ws.filter(w=>w.e.includes(searchTerm.toLowerCase())||w.k.includes(searchTerm)||w.p.includes(searchTerm));return ws}

// 카테고리 바
function renderCats(){
  const cats=[...CATS,'⭐ 즐겨찾기'];
  document.getElementById('cat-bar').innerHTML=cats.map(c=>`<button class="cat-btn ${c===curCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(c){curCat=c;curFlash=0;quizIdx=0;quizScore=0;quizDone=false;render()}
function setMode(m,btn){mode=m;document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}

function updateProg(){
  const total=WORDS.length;const done=Object.keys(memorized).length;
  const pct=Math.round(done/total*100);
  document.getElementById('prog-text').textContent=`${done} / ${total} 외움`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function render(){
  updateProg();renderCats();
  const el=document.getElementById('main-area');
  const ws=filtered();
  if(mode==='list') renderList(el,ws);
  else if(mode==='flash') renderFlash(el,ws);
  else if(mode==='quiz') renderQuiz(el,ws);
}

// ── 목록 모드 ──
function renderList(el,ws){
  el.innerHTML=`
    <div class="search-wrap"><input class="search-input" placeholder="🔍 영어·한글·발음으로 검색..." value="${searchTerm}" oninput="searchTerm=this.value;render()"></div>
    <div class="stats-bar"><div class="stat-chip">총 <strong>${ws.length}</strong>개</div><div class="stat-chip">외운 <strong>${ws.filter(w=>memorized[w.e]).length}</strong>개</div><div class="stat-chip">즐겨찾기 <strong>${ws.filter(w=>starred[w.e]).length}</strong>개</div></div>
    <div class="word-list">${ws.map((w,i)=>`
      <div class="word-item ${memorized[w.e]?'memorized':''}">
        <div class="word-check ${memorized[w.e]?'on':''}" onclick="event.stopPropagation();toggleMem('${w.e}')">✓</div>
        <div class="word-info">
          <div><span class="word-eng">${w.e}</span><span class="word-pron">[${w.p}]</span></div>
          <div class="word-kor">${w.k}</div>
        </div>
        <button class="word-star ${starred[w.e]?'on':''}" onclick="event.stopPropagation();toggleStar('${w.e}')">★</button>
      </div>
    `).join('')}</div>`;
}

function toggleMem(e){memorized[e]=!memorized[e];if(!memorized[e])delete memorized[e];save();render()}
function toggleStar(e){starred[e]=!starred[e];if(!starred[e])delete starred[e];save();render()}

// ── 플래시카드 모드 ──
function renderFlash(el,ws){
  if(!ws.length){el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">이 카테고리에 단어가 없습니다</p>';return}
  if(curFlash>=ws.length)curFlash=0;
  const w=ws[curFlash];flipped=false;
  el.innerHTML=`
    <div class="flash-wrap">
      <div class="flash-counter"><span>${curFlash+1}</span> / ${ws.length}</div>
      <div class="flash-card" id="fcard" onclick="flipCard()">
        <div class="flash-inner">
          <div class="flash-front"><div class="flash-eng">${w.e}</div><div class="flash-pron">[${w.p}]</div><div class="flash-hint">탭하면 뜻이 보여요</div></div>
          <div class="flash-back"><div class="flash-kor">${w.k}</div><div class="flash-ex">${w.e} [${w.p}]</div></div>
        </div>
      </div>
      <div class="flash-btns">
        <button class="flash-btn fbtn-dont" onclick="flashNext(ws,false)">❌ 모르겠어요</button>
        <button class="flash-btn fbtn-know" onclick="flashNext(ws,true)">✅ 외웠어요</button>
      </div>
      <div class="flash-nav">
        <button class="fnav-btn" onclick="curFlash=Math.max(0,curFlash-1);render()">◀ 이전</button>
        <button class="fnav-btn" onclick="curFlash=0;render()">🔄 처음으로</button>
        <button class="fnav-btn" onclick="shuffleFlash(ws)">🎲 섞기</button>
      </div>
    </div>`;
}
function flipCard(){document.getElementById('fcard').classList.toggle('flipped');flipped=!flipped}
function flashNext(ws,know){
  const w=ws[curFlash];
  if(know){memorized[w.e]=true;save()}
  curFlash=Math.min(curFlash+1,ws.length-1);
  if(curFlash===ws.length-1&&know)curFlash=0;
  render();
}
function shuffleFlash(ws){WORDS.sort(()=>Math.random()-.5);curFlash=0;render()}

// ── 퀴즈 모드 ──
function renderQuiz(el,ws){
  if(!ws.length||ws.length<4){el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">퀴즈에 최소 4개 이상 단어가 필요합니다</p>';return}
  if(quizDone){
    const total=Math.min(10,ws.length);const pct=Math.round(quizScore/total*100);
    const msg=pct>=90?'🏆 완벽해요!':pct>=70?'👏 잘했어요!':pct>=50?'💪 조금만 더!':'📚 복습이 필요해요';
    el.innerHTML=`<div class="quiz-wrap"><div class="quiz-result"><div class="quiz-score">${quizScore}<span>/${total}</span></div><div class="quiz-msg">${msg} (${pct}%)</div><button class="quiz-again" onclick="quizIdx=0;quizScore=0;quizDone=false;quizAnswered=false;render()">다시 풀기</button></div></div>`;
    return;
  }
  const total=Math.min(10,ws.length);
  if(quizIdx>=total){quizDone=true;render();return}
  const w=ws[quizIdx];
  const wrongs=WORDS.filter(x=>x.e!==w.e).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...wrongs.map(x=>x.k),w.k].sort(()=>Math.random()-.5);
  el.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-q">Q${quizIdx+1} / ${total}</div>
      <div class="quiz-word">${w.e}</div>
      <div class="quiz-pron">[${w.p}]</div>
      <div class="quiz-opts">${opts.map(o=>`<button class="quiz-opt" onclick="quizAnswer(this,'${o.replace(/'/g,"\\'")}','${w.k.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
    </div>`;
}
function quizAnswer(btn,sel,ans){
  if(quizAnswered)return;quizAnswered=true;
  const btns=document.querySelectorAll('.quiz-opt');
  btns.forEach(b=>{
    if(b.textContent===ans)b.classList.add('correct');
    else if(b===btn&&sel!==ans)b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  if(sel===ans)quizScore++;
  setTimeout(()=>{quizIdx++;quizAnswered=false;render()},1200);
}

render();
</script>
