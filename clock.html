<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시계</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      gap: 40px;
    }

    /* 아날로그 시계 */
    .analog-clock {
      position: relative;
      width: 280px;
      height: 280px;
    }

    .clock-face {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2a2a4a, #0f0f1a);
      box-shadow:
        0 0 0 6px #1e1e3a,
        0 0 0 10px #4f46e5,
        0 8px 40px rgba(79,70,229,0.4);
      position: relative;
    }

    /* 눈금 */
    .tick {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
    }

    .tick::after {
      content: '';
      position: absolute;
      background: #555;
      border-radius: 2px;
    }

    .tick.major::after {
      width: 3px;
      height: 14px;
      left: -1.5px;
      top: -130px;
      background: #a0a0c0;
    }

    .tick.minor::after {
      width: 1.5px;
      height: 7px;
      left: -0.75px;
      top: -127px;
      background: #444466;
    }

    /* 숫자 */
    .number {
      position: absolute;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #a0a0c0;
      transform: translate(-50%, -50%);
    }

    /* 침 */
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px 4px 0 0;
    }

    .hour-hand {
      width: 6px;
      height: 80px;
      margin-left: -3px;
      background: #e0e0f0;
      border-radius: 4px;
    }

    .minute-hand {
      width: 4px;
      height: 110px;
      margin-left: -2px;
      background: #a0a0ff;
      border-radius: 4px;
    }

    .second-hand {
      width: 2px;
      height: 120px;
      margin-left: -1px;
      background: #4f46e5;
      border-radius: 2px;
    }

    .second-hand::before {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -3px;
      width: 8px;
      height: 22px;
      background: #4f46e5;
      border-radius: 2px;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4f46e5;
      box-shadow: 0 0 10px #4f46e5;
      z-index: 10;
    }

    /* 디지털 시계 */
    .digital-clock {
      text-align: center;
    }

    .digital-time {
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 6px;
      color: #e0e0f0;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(79,70,229,0.6);
    }

    .digital-time .colon {
      color: #4f46e5;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    .digital-seconds {
      font-size: 2rem;
      color: #4f46e5;
      font-weight: 300;
      letter-spacing: 4px;
      margin-left: 4px;
      vertical-align: middle;
      font-variant-numeric: tabular-nums;
    }

    .date-display {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #666690;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .ampm {
      font-size: 1.2rem;
      color: #4f46e5;
      margin-right: 8px;
      vertical-align: middle;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- 아날로그 시계 -->
  <div class="analog-clock">
    <div class="clock-face" id="clockFace">
      <div class="center-dot"></div>
      <div class="hand hour-hand"   id="hourHand"></div>
      <div class="hand minute-hand" id="minuteHand"></div>
      <div class="hand second-hand" id="secondHand"></div>
    </div>
  </div>

  <!-- 디지털 시계 -->
  <div class="digital-clock">
    <div class="digital-time">
      <span class="ampm" id="ampm"></span>
      <span id="dHour"></span><span class="colon">:</span><span id="dMin"></span><span class="digital-seconds" id="dSec"></span>
    </div>
    <div class="date-display" id="dateDisplay"></div>
  </div>

<script>
  const clockFace = document.getElementById('clockFace');

  // 눈금 & 숫자 생성
  for (let i = 0; i < 60; i++) {
    const tick = document.createElement('div');
    tick.className = 'tick ' + (i % 5 === 0 ? 'major' : 'minor');
    tick.style.transform = `rotate(${i * 6}deg)`;
    clockFace.appendChild(tick);
  }

  const numPositions = [
    [12,  0, -100],
    [ 1, 50, -87],
    [ 2, 87, -50],
    [ 3,100,   0],
    [ 4, 87,  50],
    [ 5, 50,  87],
    [ 6,  0, 100],
    [ 7,-50,  87],
    [ 8,-87,  50],
    [ 9,-100,  0],
    [10,-87, -50],
    [11,-50, -87],
  ];

  numPositions.forEach(([n, x, y]) => {
    const el = document.createElement('div');
    el.className = 'number';
    el.textContent = n;
    el.style.left  = `calc(50% + ${x * 1.1}px)`;
    el.style.top   = `calc(50% + ${y * 1.1}px)`;
    clockFace.appendChild(el);
  });

  // 침들을 맨 위로
  ['hourHand','minuteHand','secondHand','center-dot'].forEach(id => {
    const el = document.getElementById(id) || clockFace.querySelector('.center-dot');
    if (el) clockFace.appendChild(el);
  });

  const weekDays = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    // 아날로그
    const secDeg    = (s + ms / 1000) * 6;
    const minDeg    = m * 6 + s * 0.1;
    const hourDeg   = (h % 12) * 30 + m * 0.5;

    document.getElementById('hourHand').style.transform   = `rotate(${hourDeg}deg)`;
    document.getElementById('minuteHand').style.transform = `rotate(${minDeg}deg)`;
    document.getElementById('secondHand').style.transform = `rotate(${secDeg}deg)`;

    // 디지털
    const isAM = h < 12;
    const h12  = h % 12 || 12;
    document.getElementById('ampm').textContent   = isAM ? 'AM' : 'PM';
    document.getElementById('dHour').textContent  = pad(h12);
    document.getElementById('dMin').textContent   = pad(m);
    document.getElementById('dSec').textContent   = pad(s);

    // 날짜
    const y   = now.getFullYear();
    const mon = now.getMonth() + 1;
    const d   = now.getDate();
    const day = weekDays[now.getDay()];
    document.getElementById('dateDisplay').textContent =
      `${y}년 ${mon}월 ${d}일  ${day}`;
  }

  update();
  setInterval(update, 50);
</script>
</body>
</html>
